[build-system]
requires = ["setuptools>=69"]
build-backend = "setuptools.build_meta"

[project]
name = "clawbio-bench"
version = "0.1.3"
description = "ClawBio Benchmark Suite — machine-readable harnesses for auditing bioinformatics tools"
readme = "README.md"
requires-python = ">=3.11"
license = {text = "MIT"}
authors = [
    {name = "Sergey A. Kornilov", email = "sergey@biostochastics.com"},
    {name = "ClawBio Audit Team"},
]
keywords = [
    "bioinformatics", "benchmark", "audit", "pharmacogenomics",
    "population-genetics", "metagenomics", "safety",
]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Science/Research",
    "Topic :: Scientific/Engineering :: Bio-Informatics",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Programming Language :: Python :: 3.14",
    "License :: OSI Approved :: MIT License",
]
# Core runtime dependencies. Every addition here expands the trusted computing
# base of an audit tool, so each entry must justify itself:
#   msgspec — verdict schema validation (msgspec.Struct) AND deterministic
#             JSON serialization (msgspec.json.encode(order="sorted")) in a
#             single C extension. Replaces both pydantic and orjson, shrinking
#             the trusted surface for an audit tool. JSON Schema artifacts
#             shipped under schemas/ are auto-generated via msgspec.json.schema
#             and committed as the canonical external contract.
#   regex   — variable-length lookbehind + Unicode-aware boundaries for pharmgx
#             phenotype matching (stdlib `re` false-matches "expressor" inside
#             "non-expressor" because `\b` treats `-` as a word boundary).
#   ruamel.yaml — dual ground-truth parser for YAML frontmatter migration;
#                 legacy `# KEY: value` format remains valid.
dependencies = [
    "msgspec>=0.18",
    "regex>=2024.0.0",
    "ruamel.yaml>=0.18",
]

[project.urls]
Homepage = "https://github.com/biostochastics/clawbio_bench"
Repository = "https://github.com/biostochastics/clawbio_bench"
Issues = "https://github.com/biostochastics/clawbio_bench/issues"
# The system under audit. Kept explicit so reviewers can pivot straight from
# a verdict back to the target repository.
"Audit Target" = "https://github.com/ClawBio/ClawBio"

[project.optional-dependencies]
viz = ["matplotlib>=3.8"]
ui = ["rich>=13.0"]
# Numerical stack for the fine-mapping driver (src/clawbio_bench/drivers/
# finemapping_driver.py). This is a subprocess-launched shim that runs in
# its own interpreter, so numpy is ONLY required for users who run the
# fine-mapping harness. clawbio_bench.* itself never imports numpy.
finemapping = ["numpy>=1.26", "pandas>=2.0"]
all = [
    "clawbio-bench[viz,ui,finemapping]",
    "scikit-learn>=1.4",
]
dev = [
    "pytest>=8.0",
    "ruff>=0.4",
    "pre-commit>=3.7",
    "mypy>=1.10",
    "rich>=13.0",
    # Dev installs pull in the numerical stack so the finemapping driver
    # can be exercised end-to-end in CI without a second install step.
    "numpy>=1.26",
    "pandas>=2.0",
    "scikit-learn>=1.4",
]

[project.scripts]
clawbio-bench = "clawbio_bench.cli:main"

[tool.setuptools]
package-dir = {"" = "src"}
include-package-data = true

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools.package-data]
clawbio_bench = ["test_cases/**/*"]

[tool.pytest.ini_options]
testpaths = ["tests"]
markers = [
    "smoke: Quick CI gate running against HEAD only",
    "longitudinal: Full commit sweep (slow)",
    "benchmark: All benchmark suite tests",
]

[tool.ruff]
target-version = "py311"
line-length = 99

[tool.ruff.lint]
select = ["E", "F", "W", "I", "UP", "B", "SIM"]
ignore = [
    "E501",    # line too long (handled by formatter)
    "SIM102",  # nested ifs in scoring engines improve readability of multi-condition branches
]

[tool.mypy]
python_version = "3.11"
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = true
disallow_incomplete_defs = true
check_untyped_defs = true
no_implicit_optional = true
warn_redundant_casts = true
warn_unused_ignores = true

[tool.ruff.format]
quote-style = "double"
