name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

# Pin ClawBio to a known commit so CI is deterministic.
# Benchmark exit code 1 means "findings exist" (expected), not "harness broken".
# We verify harness health by checking artifact generation, not benchmark pass/fail.
env:
  CLAWBIO_REF: "3c9383b1"

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/ruff-action@v3
        with:
          args: check
      - uses: astral-sh/ruff-action@v3
        with:
          args: format --check

  unit-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install -e ".[dev]"
      - run: pytest tests/ -x -q -k "not test_harness_smoke"

  smoke:
    runs-on: ubuntu-latest
    needs: [lint, unit-tests]
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install -e ".[dev]"
      - name: Clone ClawBio (pinned ref)
        run: |
          git clone https://github.com/ClawBio/ClawBio.git /tmp/ClawBio
          git -C /tmp/ClawBio checkout $CLAWBIO_REF
      - name: Run smoke benchmarks
        # Exit 0 or 1 are both valid (1 = findings exist, expected for ClawBio)
        # Only exit >= 2 indicates a harness crash
        run: |
          clawbio-bench --smoke --repo /tmp/ClawBio --output /tmp/results --allow-dirty
          exit_code=$?
          if [ $exit_code -ge 2 ]; then exit $exit_code; fi
          exit 0
      - name: Verify artifacts generated
        run: |
          test -f /tmp/results/bio-orchestrator/manifest.json
          test -f /tmp/results/equity-scorer/manifest.json
          test -f /tmp/results/pharmgx-reporter/manifest.json
          test -f /tmp/results/nutrigx-advisor/manifest.json
          test -f /tmp/results/claw-metagenomics/manifest.json
      - name: Upload verdict artifacts
        uses: actions/upload-artifact@v7
        with:
          name: smoke-results-py${{ matrix.python-version }}
          path: /tmp/results/
          retention-days: 30

  regression:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: [smoke]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
      - name: Clone ClawBio (full history)
        run: git clone https://github.com/ClawBio/ClawBio.git /tmp/ClawBio
      - name: Run regression sweep (last 20 commits)
        run: |
          clawbio-bench --regression-window 20 --repo /tmp/ClawBio --output /tmp/results --allow-dirty
          exit_code=$?
          if [ $exit_code -ge 2 ]; then exit $exit_code; fi
          exit 0
        timeout-minutes: 15
      - name: Upload regression artifacts
        uses: actions/upload-artifact@v7
        with:
          name: regression-results
          path: /tmp/results/
          retention-days: 90
