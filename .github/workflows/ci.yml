name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/ruff-action@v3
        with:
          args: check
      - uses: astral-sh/ruff-action@v3
        with:
          args: format --check

  unit-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install -e ".[dev]"
      - run: pytest tests/ -x -q -k "not test_harness_smoke"

  smoke:
    runs-on: ubuntu-latest
    needs: [lint, unit-tests]
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install -e ".[dev]"
      - name: Clone ClawBio
        run: git clone --depth=50 https://github.com/manuelcorpas/ClawBio.git /tmp/ClawBio
      - name: Run smoke benchmarks
        run: clawbio-bench --smoke --repo /tmp/ClawBio --output /tmp/results --allow-dirty
      - name: Upload verdict artifacts
        uses: actions/upload-artifact@v4
        with:
          name: smoke-results-py${{ matrix.python-version }}
          path: /tmp/results/
          retention-days: 30

  regression:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: [smoke]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
      - name: Clone ClawBio (full history)
        run: git clone https://github.com/manuelcorpas/ClawBio.git /tmp/ClawBio
      - name: Run regression sweep (last 20 commits)
        run: clawbio-bench --regression-window 20 --repo /tmp/ClawBio --output /tmp/results --allow-dirty
        timeout-minutes: 15
      - name: Upload regression artifacts
        uses: actions/upload-artifact@v4
        with:
          name: regression-results
          path: /tmp/results/
          retention-days: 90
